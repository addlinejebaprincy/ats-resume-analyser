<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Resume | ResumeAI</title>
</head>
<body>

    <h1>Upload Your Resume</h1>

    <form action="{{ url_for('upload_resume') }}"
          method="POST"
          enctype="multipart/form-data">

        <label for="resume">Choose a PDF or DOCX file:</label>

        <input
            type="file"
            id="resume"
            name="resume"
            accept=".pdf,.docx"
            required
        >

        <button type="submit">Upload Resume</button>
    </form>

</body>
</html>
